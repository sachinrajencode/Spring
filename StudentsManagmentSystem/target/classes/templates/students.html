<!DOCTYPE html>
<html xmlns:th="http:www.thymeleaf.org">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
<head>
<meta charset="ISO-8859-1">
<title>Student Management System</title>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <!-- Brand / Logo -->
    <a class="navbar-brand" href="#">Student Management System</a>

    <!-- Toggler button for mobile -->
    <button class="navbar-toggler" type="button" 
            data-bs-toggle="collapse" 
            data-bs-target="#collapsibleNavbar" 
            aria-controls="collapsibleNavbar" 
            aria-expanded="false" 
            aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Collapsible content -->
    <div class="collapse navbar-collapse" id="collapsibleNavbar">
        <ul class="navbar-nav ms-auto"> <!-- ms-auto = right align -->
            <li class="nav-item">
                <a class="nav-link" th:href="@{/students}">Student Management</a>
            </li>
            
        </ul>
    </div>
</nav>



 
 <div class="container">
 
 <div class=text-center>Student List</div>
 
 <div class="row">
 
 <div class="col-lg-3">
 
  <a th:href="@{students/new}" class ="btn btn-primary btn-sm mb-3">Add Student</a>
 
 </div>
 
 </div>
 
 <table class ="table table-striped table-bordered">

  <thead>
  
  <tr>
  <th>First Name</th>
       <th>Last Name</th>
       <th>Email</th>
       <th>Action</th>
  </tr>
  
  </thead>
  
  <tbody>
  
  <tr th:each="student:${students}"> 
   <td th:text="${student.firstName}"></td>
   <td th:text="${student.lastName}"></td>
   <td th:text="${student.email}"></td>
   <td><a th:href="@{students/edit/{id}(id=${student.id})}" class="btn  btn-info">Update</a>
   <a th:href="@{students/{id}(id=${student.id})}" class="btn btn-danger">Delete</a>
   
   </td>
  
   </tr>
  
  </tbody>

 </table>
</div>

</body>
</html>
